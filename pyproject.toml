[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = [
    "App/database",
    "App/exports",
    "App/logs",
    "App/scripts",
    "App/templates",
    "App/tests",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # La base existante depasse souvent 120 caracteres.
]

[tool.ruff.lint.isort]
known-first-party = ["application", "domain", "gui", "infrastructure", "cli"]
